<!DOCTYPE html>
<html>
<head>
<title>Flexbox Layout </title>

<style>

/* Page Styling */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
    text-align:center;
}

/* Header */
header{
    background-color:#2c3e50;
    color:white;
    padding:20px;
}

/* Flex Container */
.container{
    display:flex;               /* Makes container a flexbox */
    flex-direction:row;         /* Sets layout direction */
    justify-content:center;     /* Horizontal alignment */
    align-items:center;         /* Vertical alignment */
    gap:30px;                   /* Space between items */
    height:300px;
}

/* Flex Items */
.box{
    width:150px;
    height:150px;
    background-color:#3498db;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    border-radius:10px;
}

/* Footer */
footer{
    background-color:#2c3e50;
    color:white;
    padding:10px;
}

</style>
</head>

<body>

<header>
<h1>Flexbox Web Layout</h1>
<p>Example of Alignment, Spacing and Direction using Flexbox</p>
</header>

<div class="container">

<div class="box">Box 1</div>
<div class="box">Box 2</div>
<div class="box">Box 3</div>

</div>

<footer>
<p>Created using HTML & CSS Flexbox</p>
</footer>

</body>
</html>
