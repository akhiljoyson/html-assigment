<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Example</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1 id="header">Welcome to My Webpage</h1>

<p class="intro">
This is an introduction paragraph styled using the intro class.
</p>

<p>
This is a normal paragraph styled using the element selector.
</p>

<p class="highlight">
This paragraph is highlighted using highlight class.
</p>

<div class="box">
This is a box with border and padding.
</div>

</body>
</html>
