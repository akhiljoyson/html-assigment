<!DOCTYPE html>
<html>
<head>
<title>Stylish Bootstrap Layout</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(to right, #e3f2fd, #ffffff);
}

/* Card hover effect */
.card:hover{
    transform: scale(1.05);
    transition: 0.3s;
}

/* Custom spacing */
.section{
    border-radius: 12px;
}
</style>

</head>

<body>

<div class="container my-5">

    <!-- Heading -->
    <h1 class="text-center text-primary mb-3">Modern Bootstrap Layout</h1>
    <p class="text-center text-muted mb-5">
        Responsive design with nested columns and clean UI
    </p>

    <!-- Main Row -->
    <div class="row g-4">

        <!-- Column 1 -->
        <div class="col-lg-4 col-12">
            <div class="card p-4 shadow section">
                <h4 class="text-primary">Column 1</h4>
                <p>This section uses Bootstrap spacing and typography.</p>
            </div>
        </div>

        <!-- Column 2 -->
        <div class="col-lg-4 col-12">
            <div class="card p-4 shadow bg-primary text-white section">
                <h4>Column 2</h4>
                <p>Includes nested layout below 👇</p>

                <!-- Nested Row -->
                <div class="row mt-3 g-2">
                    <div class="col-6">
                        <div class="p-3 bg-warning text-dark text-center rounded">
                            Sub Col 1
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="p-3 bg-info text-white text-center rounded">
                            Sub Col 2
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Column 3 -->
        <div class="col-lg-4 col-12">
            <div class="card p-4 shadow section">
                <h4 class="text-success">Column 3</h4>
                <p>Clean layout with padding, margin, and colors.</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
