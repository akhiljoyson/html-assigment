<!DOCTYPE html>
<html>
<head>
<title>Services Page</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap JS (for navbar toggle & alert dismiss) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
body{
    background-color: #f8f9fa;
}

.card:hover{
    transform: scale(1.05);
    transition: 0.3s;
}
</style>

</head>

<body>

<!-- ✅ Task 1: Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">MyServices</a>

    <!-- Toggle button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5">

<!-- ✅ Task 3: Alert -->
<div class="alert alert-success alert-dismissible fade show" role="alert">
  Welcome to our Services Page!
  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- ✅ Task 2: Cards -->
<div class="row g-4">

  <!-- Card 1 -->
  <div class="col-lg-4 col-md-6 col-12">
    <div class="card shadow">
      <img src="https://via.placeholder.com/300" class="card-img-top">
      <div class="card-body">
        <h5 class="card-title">Web Design</h5>
        <p class="card-text">We create modern and responsive websites.</p>
        <button class="btn btn-primary">Learn More</button>
      </div>
    </div>
  </div>

  <!-- Card 2 -->
  <div class="col-lg-4 col-md-6 col-12">
    <div class="card shadow">
      <img src="https://via.placeholder.com/300" class="card-img-top">
      <div class="card-body">
        <h5 class="card-title">App Development</h5>
        <p class="card-text">We build Android and iOS applications.</p>
        <button class="btn btn-outline-success">Learn More</button>
      </div>
    </div>
  </div>

  <!-- Card 3 -->
  <div class="col-lg-4 col-md-6 col-12">
    <div class="card shadow">
      <img src="https://via.placeholder.com/300" class="card-img-top">
      <div class="card-body">
        <h5 class="card-title">Digital Marketing</h5>
        <p class="card-text">Grow your business with online marketing.</p>
        <button class="btn btn-danger">Learn More</button>
      </div>
    </div>
  </div>

</div>

<!-- ✅ Task 3: Buttons -->
<div class="text-center my-5">
  <button class="btn btn-primary m-2">Primary</button>
  <button class="btn btn-outline-success m-2">Success</button>
  <button class="btn btn-warning m-2">Warning</button>
</div>

<!-- ✅ Task 4: Contact Form -->
<h2 class="text-center mb-4">Contact Us</h2>

<form>
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input type="text" class="form-control" placeholder="Enter your name">
  </div>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" class="form-control" placeholder="Enter your email">
  </div>

  <div class="mb-3">
    <label class="form-label">Message</label>
    <textarea class="form-control" rows="4" placeholder="Enter your message"></textarea>
  </div>

  <button type="submit" class="btn btn-primary">Submit</button>
</form>

</div>

</body>
</html>
