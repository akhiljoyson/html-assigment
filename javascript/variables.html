<!DOCTYPE html>
<html>
<head>
<title>Variables in JavaScript</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    text-align: center;
}

.container{
    background-color: white;
    width: 400px;
    margin: 50px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

h2{
    color: #333;
}

p{
    font-size: 18px;
    margin: 8px 0;
}
</style>

</head>

<body>

<div class="container">
<h2>JavaScript Variable Types</h2>

<p id="output"></p>

</div>

<script>

/* Variable Declarations */

var name = "Akhil";     // string
let age = 23;           // number
const isStudent = true; // boolean

let city = "Nellore";        // string
let mobile = 9063802213;             // number

/* Display Output */

document.getElementById("output").innerHTML =
"Name: " + name + "<br>" +
"Age: " + age + "<br>" +
"Is Student: " + isStudent + "<br>" +
"City: " + city + "<br>" +
"Mobile: " + mobile;

</script>

</body>
</html>
