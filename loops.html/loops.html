<!DOCTYPE html>
<html>
<head>
<title>JavaScript Loops</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    text-align: center;
}

.container{
    background: white;
    width: 400px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

h3{
    color: #333;
}

p{
    font-size: 18px;
}
</style>

</head>

<body>

<div class="container">

<h2>JavaScript Loops Output</h2>

<h3>For Loop (1 to 10)</h3>
<p id="forLoop"></p>

<h3>While Loop (1 to 5)</h3>
<p id="whileLoop"></p>

<h3>Do-While Loop (1 to 3)</h3>
<p id="doWhileLoop"></p>

<h3>Continue & Break (1 to 10)</h3>
<p id="controlLoop"></p>

</div>

<script>

/* For Loop */
let forOutput = "";
for(let i = 1; i <= 10; i++){
    forOutput += i + " ";
}
document.getElementById("forLoop").innerHTML = forOutput;


/* While Loop */
let i = 1;
let whileOutput = "";
while(i <= 5){
    whileOutput += i + " ";
    i++;
}
document.getElementById("whileLoop").innerHTML = whileOutput;


/* Do-While Loop */
let j = 1;
let doWhileOutput = "";
do{
    doWhileOutput += j + " ";
    j++;
}while(j <= 3);
document.getElementById("doWhileLoop").innerHTML = doWhileOutput;


/* Continue and Break */
let controlOutput = "";
for(let k = 1; k <= 10; k++){

    if(k == 5){
        continue;   // Skip 5
    }

    if(k == 8){
        break;      // Stop at 8
    }

    controlOutput += k + " ";
}
document.getElementById("controlLoop").innerHTML = controlOutput;

</script>

</body>
</html>
