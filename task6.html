<!DOCTYPE html>
<html>
<head>
    <title>Table Practice Assignment</title>
    <style>
        table {
            border-collapse: collapse; /* removes double borders */
            width: 80%;
            margin: 20px auto; /* center table */
        }
        th, td {
            border: 2px solid #333; /* table borders */
            padding: 10px; /* cell padding */
            text-align: center;
        }
        th {
            background-color: #f2f2f2; /* header background */
        }
        caption {
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Class Attendance Table</h2>

    <table>
        <caption>Attendance of Students</caption>
        <tr>
            <th rowspan="2">Student Name</th>
            <th colspan="3">Subjects</th>
        </tr>
        <tr>
            <th>Math</th>
            <th>Science</th>
            <th>English</th>
        </tr>
        <tr>
            <td>Akhil</td>
            <td>Present</td>
            <td>Absent</td>
            <td>Present</td>
        </tr>
        <tr>
            <td>Joy</td>
            <td>Present</td>
            <td>Present</td>
            <td>Present</td>
        </tr>
        <tr>
            <td>Ria</td>
            <td colspan="3">All Subjects Absent</td>
        </tr>
        <tr>
            <td>Neha</td>
            <td>Absent</td>
            <td>Present</td>
            <td>Absent</td>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>Present</td>
            <td>Present</td>
            <td>Absent</td>
        </tr>
        <tr>
            <td>Sara</td>
            <td>Present</td>
            <td>Absent</td>
            <td>Present</td>
        </tr>
        <tr>
            <td>Vikram</td>
            <td>Absent</td>
            <td>Present</td>
            <td>Present</td>
        </tr>
    </table>

</body>
</html>
